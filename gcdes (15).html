const STORAGE_KEY = "gcdes-checklist-v3";
const stId   = (sk,sid)        => `${sk}::${sid}::__ST__`;
const extId      = (sk,sid)        => `${sk}::${sid}::__EXT__`;
const unitId     = (sk,sid,uid)    => `${sk}::${sid}::${uid}`;
const storId     = (sk,sid,uid,si) => `${sk}::${sid}::${uid}::s::${si}`;
const prisonId   = (sk,sid,n)      => `${sk}::${sid}::__PRISON__::${n}`; // n=1 or 2

function allIds(sk, st) {
  const ids = [stId(sk,st.id)];
  if (st.extension) ids.push(extId(sk,st.id));
  // Storage room + expansion if any unit has storage items
  const totalStorItems = storageSpacesNeeded(st.units);
  if (totalStorItems > 0) {
    ids.push(storageRoomKey(sk,st.id));
    if (totalStorItems > 40) ids.push(storageRoomExpKey(sk,st.id));
  }
  for (const u of st.units) {
    ids.push(unitId(sk,st.id,u.id));
    // Use storageItemKey (same key as training system) for storage item checkboxes
    for (const s of (STORAGE_ITEMS[u.id]||[])) ids.push(storageItemKey(sk,st.id,u.id,s));
  }
  // Prison cells for PD precincts (command is defined for precincts, undefined for outposts)
  if (sk === 'pd' && st.command !== undefined) {
    ids.push(prisonId(sk, st.id, 1));
    ids.push(prisonId(sk, st.id, 2));
  }
  return ids;
}

function tabStats(tab, checked) {
  let total=0, done=0, totalSt=0, doneSt=0;
  const groups = getGroups(tab);
  for (const g of groups) for (const st of g.stations) {
    totalSt++;
    const ids = allIds(g.key, st);
    if (ids.every(id=>checked[id])) doneSt++;
    total += ids.length;
    done  += ids.filter(id=>checked[id]).length;
  }
  return {total:total,done:done,totalSt:totalSt,doneSt:doneSt};
}

function getGroups(tab) {
  if (tab==="fire") return [
    {key:"fire",label:null,stations:FIRE_STATIONS},
    {key:"av",label:"✈️ Air Operations",stations:AVIATION},
  ];
  if (tab==="police") return [
    {key:"pd",label:"Command 1 -- Northern Valley",   stations:PD_PRECINCTS.filter(p=>p.command===1)},
    {key:"pd",label:"Command 2 -- Central County",    stations:PD_PRECINCTS.filter(p=>p.command===2)},
    {key:"pd",label:"Command 3 -- Mountain / Western",stations:PD_PRECINCTS.filter(p=>p.command===3)},
    {key:"pd",label:"Outposts & Special Units",       stations:PD_OUTPOSTS},
  ];
  if (tab==="ems") return [
    {key:"ems",label:null,stations:EMS_STATIONS}
  ];
  return [];
}

function pdTypeColor(st) {
  if (st.areaType==="Marine") return TYPE_COLORS.pd_marine;
  if (st.command===0) return TYPE_COLORS.pd_outpost;
  if (st.extension==="ESU"||st.extension==="Riot Police"||st.extension==="Federal Police"||st.extension==="Tow Trucks"||st.extension==="Police Aviation") return TYPE_COLORS.pd_outpost;
  return st.areaType==="Urban" ? TYPE_COLORS.pd_urban : TYPE_COLORS.pd_rural;
}

// Extensions that require a cooldown before their dependent units are deployable
// durationMs = milliseconds; unlockedTypes = unit types blocked until complete
const TIMED_EXTENSIONS = {
  'Game Warden': {
    durationMs: 3 * 24 * 60 * 60 * 1000, // 3 days
    label: '3 days',

// Units that require their station's extension to be built first

const UNIT_EXT_REQUIRED = {

};

// Unit types that require their station's extension to be built before they can be placed.
// Key = unit type string, value = required extension name.
const UNIT_TYPE_EXT_REQUIRED = {
  'Foam Unit':        'Foam',
  'ARFF Unit':        'ARFF',
  'Fire Boat':        'Water Rescue',
  'Rescue Boat':      'Water Rescue',
  'Light Boat':       'Water Rescue',

  'Brush Fire Unit':  'Forestry',
  'Wilderness Mobile Cmd': 'Forestry',
  'BLS Ambulance':    'Ambulance',
  'ALS Ambulance':    'Ambulance',
};

function isUnitExtBlocked(unitId, stExtension, extChecked, unitType) {
  // ID-specific gate (e.g. 06A BLS requires Ambulance extension)
  var req = UNIT_EXT_REQUIRED[unitId];
  if (req) {
    if (stExtension !== req) return false;
    return !extChecked;
  }
  // Type-level gate — unit type requires the station's extension
  if (unitType) {
    var typeReq = UNIT_TYPE_EXT_REQUIRED[unitType];
    if (typeReq) {
      if (stExtension !== typeReq) return false;
      return !extChecked;
    }
  }
  return false;
}

function extTimerKey(key, stId)     { return `timer:ext:${key}:${stId}`; }
function getExtTimerStart(key, stId, timestamps) {
  return timestamps[extTimerKey(key, stId)] || null;
}
function isExtTimerComplete(key, stId, extension, timestamps) {
  const te = TIMED_EXTENSIONS[extension];
  if (!te) return true; // no timer = always complete
  const start = getExtTimerStart(key, stId, timestamps);
  if (!start) return false;
  return (Date.now() - start) >= te.durationMs;
}
function extTimerRemaining(key, stId, extension, timestamps) {
  const te = TIMED_EXTENSIONS[extension];
  if (!te) return 0;
  const start = getExtTimerStart(key, stId, timestamps);
  if (!start) return te.durationMs;
  const remaining = te.durationMs - (Date.now() - start);
  return Math.max(0, remaining);
}
function formatRemaining(ms) {
  if (ms <= 0) return 'Complete';
  const totalSecs = Math.floor(ms / 1000);
  const days  = Math.floor(totalSecs / 86400);
  const hours = Math.floor((totalSecs % 86400) / 3600);
  const mins  = Math.floor((totalSecs % 3600) / 60);
  const secs  = totalSecs % 60;
  if (days > 0) return `${days}d ${hours}h ${mins}m`;
  if (hours > 0) return `${hours}h ${mins}m ${secs}s`;
  return `${mins}m ${secs}s`;
}
function isUnitTimerBlocked(unitType, key, stId, extension, timestamps) {
  const te = TIMED_EXTENSIONS[extension];
  if (!te) return false;
  if (!te.unlockedTypes.includes(unitType)) return false;
  return !isExtTimerComplete(key, stId, extension, timestamps);
}

// Helper: get all EMS members needing a specific course
// Also handles cross-dept ALS fire apparatus members for als-fire-apparatus course
function getEMSMembersNeedingCourse(courseId, checkedUnits, trainedKeys) {
  const members = [];
  const alsFireCourseId = deptCourseId('ems','als-fire-apparatus');

  // Normal EMS stations
  for (const st of EMS_STATIONS) {
    for (const u of st.units) {
      const courseIds = getEMSUnitCourseIds(u.type);
      if (!courseIds.includes(courseId)) continue;
      const staffCount = UNIT_STAFF[u.type] || 0;
      if (!staffCount) continue;
      const uid = unitId('ems', st.id, u.id);
      if (!checkedUnits[uid]) continue;
      const names = getMemberNames(staffCount);
      for (const name of names) {
        const tkey = memberTrainedKey('ems', st.id, u.id, name, courseId);
        if (!trainedKeys[tkey]) {
          members.push({ stationName: st.name, unitId: u.id, unitType: u.type, memberName: name, trainedKey: tkey, crossDept: false });
        }
      }
    }
  }

  // Cross-dept exception: ALS on FD units need als-fire-apparatus at EMS academy
  if (courseId === alsFireCourseId) {
    for (const st of FIRE_STATIONS) {
      for (const u of st.units) {
        if (!CROSS_DEPT_ALS_TYPES.has(u.type)) continue;
        const staffCount = UNIT_STAFF[u.type] || 0;
        if (!staffCount) continue;
        const uid = unitId('fire', st.id, u.id);
        if (!checkedUnits[uid]) continue;
        const names = getMemberNames(staffCount);
        for (const name of names) {
          // Use fire dept key so the trained record is scoped to FD
          const tkey = memberTrainedKey('fire', st.id, u.id, name, courseId);
          if (!trainedKeys[tkey]) {
            members.push({ stationName: st.name + ' (FD)', unitId: u.id, unitType: u.type, memberName: name, trainedKey: tkey, crossDept: true });
          }
        }
      }
    }
  }

  return members;
}

function memberTrainedKey(deptKey, stId, unitId, memberName, courseId) {

}

// Get all training requirements for a unit
function getUnitCourseIds(unitId, unitType) {
  const courses = new Set();
  // From storage items
  for (var _si2 = 0; _si2 < (STORAGE_ITEMS[unitId]||[]).length; _si2++) {
    var _item2 = STORAGE_ITEMS[unitId][_si2];
    var _cid2 = STORAGE_ITEM_COURSE[_item2];
    if (_cid2) courses.add(_cid2);
  }
  // From unit type — check all dept maps
  var _allTypeCourses = [].concat(
    UNIT_TYPE_COURSE[unitType] || [],
    EMS_UNIT_TYPE_COURSE[unitType] || [],
    PD_UNIT_TYPE_COURSE[unitType] || []
  );
  for (var _ci3 = 0; _ci3 < _allTypeCourses.length; _ci3++) {
    courses.add(_allTypeCourses[_ci3]);
  }
  return Array.from(courses);
}

// Get all members needing a specific course across all fire stations
function getMembersNeedingCourse(courseId, checkedUnits, trainedKeys) {
  const members = [];
  for (const st of FIRE_STATIONS) {
    for (const u of st.units) {
      const courseIds = getUnitCourseIds(u.id, u.type);
      if (!courseIds.includes(courseId)) continue;
      const staffCount = UNIT_STAFF[u.type] || 0;
      if (staffCount === 0) continue;
      // Only include if unit is built
      const uid = unitId('fire', st.id, u.id);
      if (!checkedUnits[uid]) continue;
      const names = getMemberNames(staffCount);
      for (const name of names) {
        const tkey = memberTrainedKey('fire', st.id, u.id, name, courseId);
        if (!trainedKeys[tkey]) {
          members.push({
            stationId: st.id,
            stationName: st.name,
            unitId: u.id,
            unitType: u.type,
            memberName: name,
            trainedKey: tkey,
          });
        }
      }
    }
  }
  return members;
}

        gapMap[_ut2.type].delayed        += Number(_ut2.delayed||0);
        gapMap[_ut2.type].mutualAid      += Number(_ut2.mutualAid||0);
        gapMap[_ut2.type].uponCompletion += Number(_ut2.uponCompletion||0);
        gapMap[_ut2.type].total          += Number(_ut2.needed||0);
      }
    }
    // Per-unit call volume from assignedUnits
    if (_c.assignedUnits) {
      for (var _aui2=0; _aui2<_c.assignedUnits.length; _aui2++) {
        var _au2 = _c.assignedUnits[_aui2];
        if (!unitCallVolume[_au2.uid]) unitCallVolume[_au2.uid] = {calls:0,immediate:0,delayed:0,mutualAid:0,uponCompletion:0,staffing:0,roles:{},totalResponseSecs:0,responseTimeCount:0,firstDueSecs:0,firstDueCount:0};
        var _ucv = unitCallVolume[_au2.uid];
        _ucv.calls++;
        if (_au2.response==='Immediate')       _ucv.immediate++;
        else if (_au2.response==='Delayed')    _ucv.delayed++;
        else if (_au2.response==='Mutual Aid') _ucv.mutualAid++;
        else if (_au2.response==='Upon Completion') _ucv.uponCompletion++;
        else if (_au2.response==='Staffing') { _ucv.uponCompletion++; _ucv.staffing++; }
        if (_au2.role) _ucv.roles[_au2.role] = (_ucv.roles[_au2.role]||0)+1;
        if (_au2.responseTimeSecs != null && _au2.response !== 'Upon Completion' && _au2.response !== 'Mutual Aid' && _au2.response !== 'Staffing') {
          _ucv.totalResponseSecs += _au2.responseTimeSecs;
          _ucv.responseTimeCount++;
          if (_au2.dueOrder && _au2.dueOrder.indexOf('1st') === 0) {
            _ucv.firstDueSecs += _au2.responseTimeSecs;
            _ucv.firstDueCount++;
          }
        }
      }
    }
    if (_c.equipment) {
      for (var _eqi2=0; _eqi2<_c.equipment.length; _eqi2++) {
        var _eq2 = _c.equipment[_eqi2];
        if (!equipStat2[_eq2.id]) equipStat2[_eq2.id] = {deployed:0,immediate:0,delayed:0,mutualAid:0,notAvailable:0};
        var _es2 = equipStat2[_eq2.id];
        _es2.deployed++;
        if (_eq2.response==='Immediate')      _es2.immediate++;
        else if (_eq2.response==='Delayed')   _es2.delayed++;
        else if (_eq2.response==='Mutual Aid') _es2.mutualAid++;
        else if (_eq2.response==='Not Available') _es2.notAvailable++;
      }
    }
  }
  var gapEntries = Object.keys(gapMap).map(function(type) {
    var v = gapMap[type];
    return {type:type, delayed:v.delayed, mutualAid:v.mutualAid, uponCompletion:v.uponCompletion,
      total:v.total, nonImmediate:v.delayed+v.mutualAid+v.uponCompletion};
  }).filter(function(e){return e.nonImmediate>0;})
    .sort(function(a,b){return b.nonImmediate-a.nonImmediate;});
  var topUnits = Object.keys(unitCounts).sort(function(a,b){return unitCounts[b]-unitCounts[a];}).slice(0,8);
  var topZones = Object.keys(byZone).sort(function(a,b){return byZone[b]-byZone[a];}).slice(0,6);

  // Street hotspots: per zip, top streets with ≥2 calls
  var streetHotspots = []; // [{zip, place, streets:[{street,count}]}]
  var _svZips = Object.keys(streetVolume);
  for (var _svzi=0; _svzi<_svZips.length; _svzi++) {
    var _svZip = _svZips[_svzi];
    var _svStreets = Object.keys(streetVolume[_svZip]);
    var _topStreets = _svStreets
      .filter(function(s){return streetVolume[_svZip][s] >= 2;})
      .sort(function(a,b){return streetVolume[_svZip][b]-streetVolume[_svZip][a]})
      .slice(0,5)
      .map(function(s){return {street:s, count:streetVolume[_svZip][s]};});
    if (_topStreets.length > 0) {
      var _svZd = zipLookup[_svZip];
      streetHotspots.push({zip:_svZip, place:_svZd?_svZd.place:_svZip, streets:_topStreets, total:_topStreets.reduce(function(a,s){return a+s.count;},0)});
    }
  }
  streetHotspots.sort(function(a,b){return b.total-a.total;});
  var sortedBattalions = Object.keys(battalionVolume).sort(function(a,b){
    // Sort by battalion number: BC-1 before BC-2 etc
    var na = parseInt(a.replace(/\D/g,''))||0, nb = parseInt(b.replace(/\D/g,''))||0;
    return na-nb;
  });
  var sortedPrecincts = Object.keys(precinctVolume).sort(function(a,b){
    var na = parseInt(a.replace(/\D/g,''))||0, nb = parseInt(b.replace(/\D/g,''))||0;
    return na-nb;
  });

  return (
    <div style={{maxWidth:980,margin:'0 auto',padding:'14px 12px'}}>

      {/* Header */}
      <div style={{background:'white',borderRadius:10,padding:'12px 16px',marginBottom:12,
        border:'2px solid #c0392b',boxShadow:'0 2px 8px rgba(0,0,0,0.07)',
        display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:'#c0392b'}}>📞 Call Log</div>
          <div style={{fontSize:11,color:'#888',marginTop:1}}>{calls.length} calls logged</div>
        </div>
        <button onClick={function(){setCallForm(null); setEditingCallId(null);}}
          style={{padding:'5px 12px',borderRadius:6,fontSize:11,fontWeight:700,cursor:'pointer',
            border:'2px solid #c0392b',
            background:(!showStats)?'#c0392b':'white',
            color:(!showStats)?'white':'#c0392b'}}>
          📋 Log
        </button>
        <button onClick={function(){setCallForm(null); setEditingCallId('__STATS__');}}
          style={{padding:'5px 12px',borderRadius:6,fontSize:11,fontWeight:700,cursor:'pointer',
            border:'2px solid #c0392b',
            background:showStats?'#c0392b':'white',
            color:showStats?'white':'#c0392b'}}>
          📊 Stats
        </button>
        {!showStats && (
          <button onClick={function(){setCallForm(Object.assign({},emptyForm,{unitTypes:[]}));setEditingCallId(null);}}
            style={{padding:'7px 16px',borderRadius:7,border:'none',cursor:'pointer',
              fontSize:12,fontWeight:700,background:'#c0392b',color:'white'}}>
            + Log Call
          </button>
        )}
      </div>

      {/* STATS */}
      {showStats && (
        <div>
          {totalCalls === 0 && (
            <div style={{textAlign:'center',padding:'40px',color:'#aaa',fontSize:13}}>No calls logged yet.</div>
          )}
          {totalCalls > 0 && (
            <div style={{display:'flex',flexDirection:'column',gap:10}}>

              {/* Outcome Summary */}
              <div style={{background:'white',borderRadius:9,padding:'14px',border:'1px solid #e0e0e0'}}>
                <div style={{fontSize:13,fontWeight:700,color:'#1a2744',marginBottom:10}}>📊 Outcome Summary</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {[['Handled','#27ae60'],['Mutual Aid','#8e44ad'],['Own + Mutual Aid','#c0392b']].map(function(_oa) {
                    var o=_oa[0], clr=_oa[1];
                    var cnt = outcomeCounts[o]||0;
                    var pct = totalCalls>0 ? Math.round(cnt/totalCalls*100) : 0;
                    return (
                      <div key={o} style={{flex:1,minWidth:100,background:clr+'12',borderRadius:7,
                        padding:'10px 12px',border:'1px solid '+clr+'33',textAlign:'center'}}>
                        <div style={{fontSize:24,fontWeight:800,color:clr}}>{cnt}</div>
                        <div style={{fontSize:10,fontWeight:600,color:clr,marginTop:2}}>{o}</div>
                        <div style={{fontSize:10,color:'#aaa'}}>{pct}%</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Calls by Type bar chart */}
              <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #e0e0e0'}}>
                <div style={{fontSize:12,fontWeight:700,color:'#555',marginBottom:8}}>Calls by Type</div>
                {Object.keys(byType).map(function(ct) {
                  var pct = Math.round(byType[ct]/totalCalls*100);
                  return (
                    <div key={ct} style={{marginBottom:6}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:2}}>
                        <span style={{fontWeight:600,color:CALL_TYPE_COLOR[ct]||'#888'}}>{ct}</span>
                        <span style={{color:'#555'}}>{byType[ct]} ({pct}%)</span>
                      </div>
                      <div style={{background:'#f0f0f0',borderRadius:4,height:8,overflow:'hidden'}}>
                        <div style={{width:pct+'%',height:'100%',background:CALL_TYPE_COLOR[ct]||'#888',borderRadius:4}}/>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Top Locations */}
              {topZones.length > 0 && (
                <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #e0e0e0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#555',marginBottom:8}}>Top Locations</div>
                  {topZones.map(function(z) {
                    return (
                      <div key={z} style={{display:'flex',justifyContent:'space-between',
                        padding:'4px 0',borderBottom:'1px solid #f5f5f5',fontSize:12}}>
                        <span style={{color:'#333'}}>{z}</span>
                        <span style={{fontWeight:700,color:'#c0392b'}}>{byZone[z]}</span>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Street Hotspots */}
              {streetHotspots.length > 0 && (
                <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #e0e0e0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#555',marginBottom:8}}>📍 Address Hotspots</div>
                  <div style={{fontSize:10,color:'#aaa',marginBottom:8}}>Streets with 2+ calls — grouped by zip</div>
                  {streetHotspots.map(function(zh) {
                    return (
                      <div key={zh.zip} style={{marginBottom:10}}>
                        <div style={{fontSize:11,fontWeight:700,color:'#c0392b',marginBottom:4}}>
                          {zh.zip} {zh.place}
                        </div>
                        {zh.streets.map(function(sh) {
                          var barW = Math.round(sh.count / zh.streets[0].count * 100);
                          return (
                            <div key={sh.street} style={{marginBottom:4}}>
                              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:1}}>
                                <span style={{color:'#333'}}>{sh.street}</span>
                                <span style={{fontWeight:700,color:'#c0392b'}}>{sh.count}</span>
                              </div>
                              <div style={{background:'#f0f0f0',borderRadius:3,height:5,overflow:'hidden'}}>
                                <div style={{width:barW+'%',height:'100%',background:'#c0392b',borderRadius:3}}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Battalion Call Volume */}
              {sortedBattalions.length > 0 && (
                <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #e0e0e0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#2d7a2d',marginBottom:8}}>🚒 Battalion Call Volume</div>
                  <div style={{fontSize:10,color:'#aaa',marginBottom:8}}>All call types within battalion area — sorted by battalion number</div>
                  {sortedBattalions.map(function(bc) {
                    var cnt = battalionVolume[bc];
                    var pct = totalCalls > 0 ? Math.round(cnt/totalCalls*100) : 0;
                    var barPct = Math.max.apply(null, Object.keys(battalionVolume).map(function(k){return battalionVolume[k];}));
                    var barW = barPct > 0 ? Math.round(cnt/barPct*100) : 0;
                    return (
                      <div key={bc} style={{marginBottom:6}}>
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:2}}>
                          <span style={{fontWeight:700,color:'#2d7a2d'}}>{bc}</span>
                          <span style={{color:'#555'}}>{cnt} calls ({pct}% of total)</span>
                        </div>
                        <div style={{background:'#f0f0f0',borderRadius:4,height:8,overflow:'hidden'}}>
                          <div style={{width:barW+'%',height:'100%',background:'#2d7a2d',borderRadius:4}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Precinct Call Volume */}
              {sortedPrecincts.length > 0 && (
                <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #e0e0e0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#1565c0',marginBottom:8}}>🚔 Precinct Call Volume</div>
                  <div style={{fontSize:10,color:'#aaa',marginBottom:8}}>All call types within precinct area — sorted by precinct number</div>
                  {sortedPrecincts.map(function(p) {
                    var cnt = precinctVolume[p];
                    var pct = totalCalls > 0 ? Math.round(cnt/totalCalls*100) : 0;
                    var barPct = Math.max.apply(null, Object.keys(precinctVolume).map(function(k){return precinctVolume[k];}));
                    var barW = barPct > 0 ? Math.round(cnt/barPct*100) : 0;
                    return (
                      <div key={p} style={{marginBottom:6}}>
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:2}}>
                          <span style={{fontWeight:700,color:'#1565c0'}}>{p}</span>
                          <span style={{color:'#555'}}>{cnt} calls ({pct}% of total)</span>
                        </div>
                        <div style={{background:'#f0f0f0',borderRadius:4,height:8,overflow:'hidden'}}>
                          <div style={{width:barW+'%',height:'100%',background:'#1565c0',borderRadius:4}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Most Dispatched Unit Types */}
              {topUnits.length > 0 && (
                <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #e0e0e0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#555',marginBottom:8}}>Most Dispatched Unit Types</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {topUnits.map(function(u) {
                      return (
                        <span key={u} style={{background:'#f4f4f4',borderRadius:5,padding:'4px 10px',
                          fontSize:11,color:'#333',border:'1px solid #e0e0e0'}}>
                          {u} <strong style={{color:'#c0392b'}}>{unitCounts[u]}</strong>
                        </span>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Equipment Coverage */}
              {Object.keys(equipStat2).length > 0 && (
                <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #d5c5f7'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#7d3c98',marginBottom:8}}>🗃️ Specialized Equipment Response</div>
                  {['usar','hazmat','sar','water','lighttower','mobilecmd'].filter(function(id){return !!equipStat2[id];}).map(function(id) {
                    var es = equipStat2[id];
                    var label = {usar:'USAR/Tech Rescue',hazmat:'Hazmat',sar:'SAR',water:'Water Rescue',lighttower:'Scene Lighting',mobilecmd:'Mobile Command'}[id]||id;
                    var gapPct = es.deployed>0 ? Math.round((es.delayed+es.mutualAid+es.notAvailable)/es.deployed*100) : 0;
                    var gapClr = gapPct>=50?'#c0392b':gapPct>=25?'#e67e22':'#27ae60';
                    return (
                      <div key={id} style={{marginBottom:8,paddingBottom:8,borderBottom:'1px solid #f5f5f5'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                          <span style={{fontSize:12,fontWeight:700,color:'#333'}}>{label}</span>
                          <span style={{fontSize:11,fontWeight:700,color:gapClr}}>{es.deployed} deployments · {gapPct}% gap</span>
                        </div>
                        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                          {es.immediate>0 && <span style={{fontSize:10,background:'#eafaf1',color:'#27ae60',borderRadius:4,padding:'1px 7px',border:'1px solid #27ae6044'}}>{es.immediate} Immediate</span>}
                          {es.delayed>0 && <span style={{fontSize:10,background:'#fff3cd',color:'#e67e22',borderRadius:4,padding:'1px 7px',border:'1px solid #e67e2244'}}>{es.delayed} Delayed</span>}
                          {es.mutualAid>0 && <span style={{fontSize:10,background:'#f3e5f5',color:'#8e44ad',borderRadius:4,padding:'1px 7px',border:'1px solid #8e44ad44'}}>{es.mutualAid} Mutual Aid</span>}
                          {es.notAvailable>0 && <span style={{fontSize:10,background:'#fdecea',color:'#c0392b',borderRadius:4,padding:'1px 7px',border:'1px solid #c0392b44'}}>{es.notAvailable} Not Available</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Unit Call Volume */}
              {Object.keys(unitCallVolume).length > 0 && (
                <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #e0e0e0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#1a2744',marginBottom:8}}>📋 Unit Call Volume</div>
                  {Object.keys(unitCallVolume).sort(function(a,b){return unitCallVolume[b].calls-unitCallVolume[a].calls;}).slice(0,15).map(function(uid) {
                    var ucv = unitCallVolume[uid];
                    var gapPct = ucv.calls>0 ? Math.round((ucv.delayed+ucv.mutualAid+ucv.uponCompletion)/ucv.calls*100) : 0;
                    var gapClr = gapPct>=50?'#c0392b':gapPct>=25?'#e67e22':'#555';
                    var roleStr = Object.keys(ucv.roles).map(function(r){return r+'×'+ucv.roles[r];}).join(', ');
                    var _rtMinSample = /^Spare Engine\b/.test(uid) ? 5 : 3;
                    var avgSecs = ucv.responseTimeCount >= _rtMinSample ? Math.round(ucv.totalResponseSecs/ucv.responseTimeCount) : null;
                    var avgStr = avgSecs!=null ? (Math.floor(avgSecs/60)+':'+(avgSecs%60<10?'0':'')+avgSecs%60) : null;
                    var firstDueAvg = ucv.firstDueCount>0 ? Math.round(ucv.firstDueSecs/ucv.firstDueCount) : null;
                    var firstDueStr = firstDueAvg!=null ? (Math.floor(firstDueAvg/60)+':'+(firstDueAvg%60<10?'0':'')+firstDueAvg%60) : null;
                    var benchSecs = firstDueAvg!=null ? firstDueAvg : avgSecs;
                    // green <4min, orange 4-15min, red >15min — universal across fire/ems/pd
                    var avgClr = benchSecs==null ? '#aaa' : benchSecs<240?'#27ae60':benchSecs<900?'#e67e22':'#c0392b';
                    return (
                      <div key={uid} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',
                        borderBottom:'1px solid #f5f5f5',flexWrap:'wrap'}}>
                        <span style={{fontSize:12,fontWeight:700,color:'#1a2744',minWidth:100}}>{uid}</span>
                        <span style={{fontSize:11,background:'#f0f0f0',borderRadius:4,padding:'1px 7px',color:'#555'}}>
                          {ucv.calls} call{ucv.calls!==1?'s':''}
                        </span>
                        {gapPct>0 && <span style={{fontSize:10,fontWeight:700,color:gapClr}}>{gapPct}% gap</span>}
                        {avgStr && (
                          <span style={{fontSize:10,fontWeight:700,color:avgClr}}>
                            ⏱ {firstDueStr ? '1st: '+firstDueStr+' · all: '+avgStr : 'avg '+avgStr} ({ucv.responseTimeCount} timed)
                          </span>
                        )}
                        {roleStr && <span style={{fontSize:10,color:'#8e44ad'}}>{roleStr}</span>}
                        <div style={{display:'flex',gap:4,marginLeft:'auto'}}>
                          {ucv.immediate>0 && <span style={{fontSize:9,background:'#eafaf1',color:'#27ae60',borderRadius:3,padding:'1px 5px'}}>{ucv.immediate}imm</span>}
                          {ucv.delayed>0 && <span style={{fontSize:9,background:'#fff3cd',color:'#e67e22',borderRadius:3,padding:'1px 5px'}}>{ucv.delayed}del</span>}
                          {ucv.mutualAid>0 && <span style={{fontSize:9,background:'#f3e5f5',color:'#8e44ad',borderRadius:3,padding:'1px 5px'}}>{ucv.mutualAid}MA</span>}
                          {ucv.uponCompletion>0 && <span style={{fontSize:9,background:'#e3f2fd',color:'#2980b9',borderRadius:3,padding:'1px 5px'}}>{ucv.uponCompletion-(ucv.staffing||0)}UC</span>}
                          {(ucv.staffing||0)>0 && <span style={{fontSize:9,background:'#fbe9e7',color:'#d35400',borderRadius:3,padding:'1px 5px'}}>{ucv.staffing}stf</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Coverage Gaps — unit types with non-immediate responses */}
              {gapEntries.length > 0 && (
                <div style={{background:'white',borderRadius:9,padding:'12px 14px',border:'1px solid #e0e0e0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#c0392b',marginBottom:8}}>⚠️ Coverage Gaps</div>
                  {gapEntries.map(function(e) {
                    return (
                      <div key={e.type} style={{marginBottom:8,paddingBottom:8,borderBottom:'1px solid #f5f5f5'}}>
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                          <span style={{fontWeight:700,color:'#333'}}>{e.type}</span>
                          <span style={{color:'#c0392b',fontWeight:700}}>{e.nonImmediate} non-immediate</span>
                        </div>
                        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                          {e.delayed>0 && (
                            <span style={{fontSize:10,background:'#fff3cd',color:'#856404',
                              borderRadius:4,padding:'1px 7px',border:'1px solid #ffc10744'}}>
                              {e.delayed} Delayed
                            </span>
                          )}
                          {e.mutualAid>0 && (
                            <span style={{fontSize:10,background:'#f3e5f5',color:'#6a1b9a',
                              borderRadius:4,padding:'1px 7px',border:'1px solid #8e44ad44'}}>
                              {e.mutualAid} Mutual Aid
                            </span>
                          )}
                          {e.uponCompletion>0 && (
                            <span style={{fontSize:10,background:'#e3f2fd',color:'#0d47a1',
                              borderRadius:4,padding:'1px 7px',border:'1px solid #1565c044'}}>
                              {e.uponCompletion} Upon Completion
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

            </div>
          )}
        </div>
      )}

      {/* LOG */}
      {!showStats && (
        <div>
          {callForm && (
            <div style={{background:'white',borderRadius:10,padding:'16px',marginBottom:14,
              border:'2px solid #c0392b',boxShadow:'0 4px 16px rgba(192,57,43,0.12)'}}>

              {/* Page indicator + title */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                <div style={{fontSize:14,fontWeight:700,color:'#c0392b'}}>
                  {(editingCallId && editingCallId !== '__STATS__') ? 'Edit Call' : 'Log New Call'}
                </div>

                            // Hard exclusions: skip PD candidates on EMS lines and vice versa
                            if (lineIsEMS && candidate.key === 'pd') continue;
                            if (lineIsPD  && candidate.key === 'ems') continue;
                            // Check if this candidate matches the line's dept context
                            var deptMatch = (lineIsEMS && candidate.key === 'ems') ||
                                           (lineIsPD  && candidate.key === 'pd') ||
                                           (!lineIsEMS && !lineIsPD && candidate.key === 'fire');
                            if (deptMatch) {
                              matched = candidate;
                              break; // dept-context match wins immediately
                            } else if (!matchedSecondary) {
                              matchedSecondary = candidate; // keep as fallback
                            }
                          }
                        }
                        // Fall back to first match if no dept-context match found
                        if (!matched) matched = matchedSecondary;

                        // Dept-aware response time thresholds (seconds)
                        // Fire urban: 4min immediate, 8min delayed, >8min UC
                        // Fire rural: 8min immediate, 12min delayed, >12min UC
                        // EMS: 8:59 immediate, 14:59 delayed, >15min UC
                        // PD urban: 7min immediate, 12min delayed, >12min UC
                        // PD rural: 15min immediate, 20min delayed, >20min UC
                        var dept3 = matched ? matched.key : 'fire';
                        var immThresh;
                        if (dept3 === 'ems') {
                          immThresh = 539;  // 8:59
                        } else if (dept3 === 'pd') {
                          immThresh = 900;  // 15min rural-safe
                        } else {
                          immThresh = 480;  // 8min rural-safe fire
                        }

                        // Determine response type:
                        // - "starts in" = crew not yet at station, spare being pressed into service -> Upon Completion
                        // - on-run description = unit busy on another call -> Upon Completion
                        // - status code sets availability state
                        // - response time overrides Immediate -> Delayed if it exceeds standard
                        var responseType = 'Immediate';
                        if (isStartsIn) {
                          responseType = 'Staffing'; // spare being staffed — crew responding to station
                        } else if (hasOnRunDesc) {
                          responseType = 'Upon Completion'; // unit on another run
                        } else if (statusCode && STATUS_RESPONSE[statusCode]) {
                          responseType = STATUS_RESPONSE[statusCode];
                        }
                        // Apply time-based floor only for Immediate -> Delayed
                        if (responseSecs !== null && responseType === 'Immediate') {
                          if (responseSecs > immThresh) responseType = 'Delayed';
                        }
                        if (matched) {
                          var _rtSecs = (responseType==='Upon Completion'||responseType==='Mutual Aid'||responseType==='Staffing') ? null : responseSecs;
                          results.push({uid:matched.unitId, dept:matched.key, stationId:matched.stId, role:'', response:responseType, line:line, status:statusCode, responseTimeSecs:_rtSecs, startsIn:isStartsIn||false});
                        } else {
                          results.push({uid:null, line:line, response:responseType, status:statusCode, responseTimeSecs:responseSecs, startsIn:isStartsIn||false});
                        }
                      }
                      return results;
                    }
                    return (
                      <div style={{marginBottom:14,padding:'10px 12px',background:'#f8f9fa',borderRadius:8,border:'1px solid #e0e0e0'}}>

                        {callForm._dispatchPaste && (function(){

                              // Match: anything, zip (5 digits), anything
                              var _zipM = _ll.match(/^([^,]+),\s*(\d{5})(?:\s|,|$)/);
                              if (_zipM) {
                                var _addr = _zipM[1].trim();
                                var _zip = _zipM[2];
                                // Only use zip if it's in our known zip lists
                                var _isGreene = !!zipLookup[_zip];
                                var _isBorder = !!borderZipLookup[_zip];
                                if (_isGreene || _isBorder) {
                                  return {
                                    address: _addr,
                                    zip: _zip,
                                    outOfCounty: _isBorder,
                                    mutualAidAgency: _isBorder ? borderZipLookup[_zip].county+' mutual aid' : '',
                                  };
                                }
                              }
                            }
                            return null;
                          })();
                          var parsed = parseDispatchPaste(callForm._dispatchPaste);

                                    {matched.map(function(m,i){

                                    })}

                                </div>

                              {unmatched.length > 0 && (
                                <div style={{fontSize:10,color:'#e74c3c',marginBottom:6}}>
                                  ⚠️ {unmatched.length} line{unmatched.length!==1?'s':''} not matched — check unit IDs
                                </div>
                              )}
                              {matched.length > 0 && (
                                <button onClick={function(){

                                  setCallForm(function(p){
                                    var locUpdates = {};

                                      if (!p.zip) locUpdates.zip = _locResult.zip;

function RunTab(props) { var allNeeds=props.allNeeds,sessions=props.sessions,DEPT_META=props.DEPT_META,isAcademyBusy=props.isAcademyBusy,getAvailableAcademy=props.getAvailableAcademy,completeSession=props.completeSession,cancelSession=props.cancelSession,startSession=props.startSession,toggleEnrollMember=props.toggleEnrollMember;
  var runnable = allNeeds.filter(function(n){
    if (isAcademyBusy(n.dept)) return false;
    return true;
  });
  var running = [];
  var deptKeys = Object.keys(DEPT_META);
  for (var di = 0; di < deptKeys.length; di++) {
    var dept = deptKeys[di];
    var meta = DEPT_META[dept];
    for (var ai = 0; ai < meta.academies.length; ai++) {
      var ac = meta.academies[ai];
      for (var ci = 0; ci < meta.courses.length; ci++) {
        var course = meta.courses[ci];
        if (sessions[courseSessionKey(ac.id, course.id)])
          running.push({dept:dept,meta:meta,ac:ac,course:course});

    <div>

          <div style={{fontSize:12,fontWeight:700,color:'#27ae60',marginBottom:6}}>🟢 Currently Running</div>
          {running.map(function(_o) {
            var dept=_o.dept, meta=_o.meta, ac=_o.ac, course=_o.course;
            var ep = 'enroll::'+ac.id+'::'+course.id+'::';
            var enrolledCount = Object.keys(sessions).filter(function(k){return k.startsWith(ep);}).length;
            var needObj = allNeeds.find(function(n){return n.dept===dept && n.course.id===course.id;});
            var needCount = needObj ? needObj.members.length : 0;
            return (
              <div key={courseSessionKey(ac.id,course.id)} style={{background:'#f0fff8',
                borderRadius:9,marginBottom:8,border:'2px solid #27ae60',overflow:'hidden'}}>
                <div style={{padding:'9px 14px',borderBottom:'1px solid #c3f0d8',
                  display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:11,background:meta.color,color:'white',borderRadius:4,
                    padding:'1px 6px',fontWeight:700}}>{meta.label}</span>
                  <span style={{fontWeight:700,fontSize:13,color:'#1a2744'}}>{course.name}</span>
                  <span style={{fontSize:11,color:'#888'}}>🏫 {ac.name.split(' ').slice(0,3).join(' ')}</span>
                  <span style={{fontSize:12,fontWeight:700,color:'#27ae60',marginLeft:'auto'}}>🟢 {enrolledCount} enrolled</span>
                </div>
                <div style={{padding:'10px 14px'}}>
                  <div style={{display:'flex',gap:6,marginBottom:6}}>
                    <button onClick={function(){completeSession(ac.id,course.id);}}
                      style={{padding:'5px 12px',background:'#27ae60',color:'white',border:'none',
                        borderRadius:5,cursor:'pointer',fontSize:12,fontWeight:700}}>✓ Complete Class</button>
                    <button onClick={function(){cancelSession(ac.id,course.id);}}
                      style={{padding:'5px 10px',background:'#e74c3c',color:'white',border:'none',
                        borderRadius:5,cursor:'pointer',fontSize:12}}>✕ Cancel</button>
                  </div>
                  {needObj && needObj.members.length > 0 && (
                    <div style={{marginTop:8}}>
                      <div style={{fontSize:11,color:'#555',fontWeight:600,marginBottom:5}}>
                        Enroll students ({enrolledCount} enrolled):
                      </div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                        {needObj.members.map(function(mem) {
                          var ek = 'enroll::'+ac.id+'::'+course.id+'::'+mem.trainedKey;
                          var isEnrolled = !!sessions[ek];
                          var inOther = !isEnrolled && Object.keys(sessions).some(function(k){
                            return k.startsWith('enroll::') && k.endsWith('::'+mem.trainedKey) && k !== ek;
                          });
                          return (
                            <div key={mem.trainedKey}
                              onClick={function(){if(!inOther) toggleEnrollMember(ac.id,course.id,mem.trainedKey,enrolledCount);}}
                              style={{padding:'3px 8px',borderRadius:4,fontSize:11,cursor:inOther?'not-allowed':'pointer',
                                border:'1px solid '+(isEnrolled?'#27ae60':inOther?'#ccc':'#aaa'),
                                background:isEnrolled?'#e8f8e8':inOther?'#f5f5f5':'white',
                                color:isEnrolled?'#27ae60':inOther?'#aaa':'#333',
                                fontWeight:isEnrolled?700:400,
                                opacity:inOther?0.5:1}}>
                              {isEnrolled?'✓ ':''}{mem.unitId} · {mem.memberName}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  {(!needObj || needObj.members.length === 0) && (
                    <div style={{fontSize:11,color:'#888',marginTop:4}}>No eligible members found.</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {runnable.length === 0 && running.length === 0 && (
        <div style={{background:'#e8f8e8',borderRadius:8,padding:'20px',textAlign:'center',
          color:'#27ae60',fontWeight:700}}>✅ Nothing needs training right now</div>
      )}
      {runnable.length > 0 && (
        <div>
          <div style={{fontSize:12,fontWeight:700,color:'#555',marginBottom:6}}>Available to Start</div>
          {runnable.map(function(_o) {
            var dept=_o.dept, meta=_o.meta, course=_o.course, members=_o.members;
            var ac = getAvailableAcademy(dept);
            if (!ac) return null;
            return (
              <div key={course.id} style={{background:'white',borderRadius:8,marginBottom:6,
                border:'1px solid '+meta.color+'33',overflow:'hidden'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',flexWrap:'wrap'}}>
                  <span style={{fontSize:11,background:meta.color,color:'white',borderRadius:4,
                    padding:'1px 6px',fontWeight:700}}>{meta.label}</span>
                  <span style={{fontWeight:600,fontSize:13,color:'#1a2744'}}>{course.name}</span>
                  <span style={{fontSize:10,color:'#888'}}>{course.days} days · 🏫 {ac.name.split(' ').slice(0,3).join(' ')}</span>

                  <button onClick={function(){startSession(ac.id,course.id);}}
                    style={{marginLeft:'auto',padding:'5px 12px',background:meta.color,color:'white',
                      border:'none',borderRadius:5,cursor:'pointer',fontSize:12,fontWeight:700}}>
                    ▶ Start Class</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


function TrainingTab(props) { var checked=props.checked,trained=props.trained,sessions=props.sessions,setTrained=props.setTrained,setSessions=props.setSessions,trainingTab=props.trainingTab,setTrainingTab=props.setTrainingTab,now=props.now;


        const startSession  = (acId, cId) => setSessions(p=>({...p,
          [courseSessionKey(acId,cId)]:true,[courseStartTimeKey(acId,cId)]:Date.now()}));

        const completeSession = (acId, cId) => {
          const ep = `enroll::${acId}::${cId}::`;
          const enrolled = Object.keys(sessions).filter(k=>k.startsWith(ep));
          setTrained(p=>{ const n={...p}; enrolled.forEach(ek=>{n[ek.replace(ep,'')]=true;}); return n; });
          setSessions(p=>{ const n={...p}; delete n[courseSessionKey(acId,cId)]; delete n[courseStartTimeKey(acId,cId)];
            Object.keys(n).filter(k=>k.startsWith(ep)).forEach(k=>delete n[k]);
            n[courseCompleteKey(acId,cId)]=(n[courseCompleteKey(acId,cId)]||0)+1; return n; });
        };

        const cancelSession = (acId, cId) => setSessions(p=>{
          const n={...p}; delete n[courseSessionKey(acId,cId)]; delete n[courseStartTimeKey(acId,cId)];
          Object.keys(n).filter(k=>k.startsWith(`enroll::${acId}::${cId}::`)).forEach(k=>delete n[k]); return n; });

        const toggleEnrollMember = (acId, cId, tkey, enrolledCount) => {
          const ek = courseEnrollKey(acId,cId,tkey);
          const inOther = Object.keys(sessions).some(k=>k.startsWith('enroll::')&&k.endsWith(`::${tkey}`)&&k!==ek);
          if(inOther) return;
          setSessions(p=>{ const n={...p}; if(n[ek]){delete n[ek];}else if(enrolledCount<10){n[ek]=true;} return n; });
        };

        const DEPT_META = {
          fire:{color:'#c0392b',label:'FD', academies:FIRE_ACADEMIES,courses:FIRE_COURSES,
            getMem:(cid)=>{ const r=[];
              for(const st of FIRE_STATIONS){for(const u of st.units){
                const sc=UNIT_STAFF[u.type]||0; if(!sc) continue;
                if(!checked[unitId('fire',st.id,u.id)]) continue;
                if(!getUnitCourseIds(u.id,u.type).includes(cid)) continue;
                getMemberNames(sc).forEach(name=>{ const tk=memberTrainedKey('fire',st.id,u.id,name,cid);
                  if(!trained[tk]) r.push({stationName:st.name,unitId:u.id,memberName:name,trainedKey:tk}); });
              }} return r; }},
          pd:{color:'#1565c0',label:'PD', academies:PD_ACADEMIES,courses:PD_COURSES,
            getMem:(cid)=>{ const r=[];
              for(const st of [...PD_PRECINCTS,...PD_OUTPOSTS]){for(const u of st.units){
                const sc=UNIT_STAFF[u.type]||0; if(!sc) continue;
                if(!checked[unitId('pd',st.id,u.id)]) continue;
                if(!getPDUnitCourseIds(u.type).includes(cid)) continue;
                getMemberNames(sc).forEach(name=>{ const tk=memberTrainedKey('pd',st.id,u.id,name,cid);
                  if(!trained[tk]) r.push({stationName:st.name,unitId:u.id,memberName:name,trainedKey:tk}); });
              }} return r; }},
          ems:{color:'#e67e22',label:'EMS',academies:EMS_ACADEMIES,courses:EMS_COURSES,
            getMem:(cid)=>{ const r=[];
              for(const st of EMS_STATIONS){for(const u of st.units){
                const sc=UNIT_STAFF[u.type]||0; if(!sc) continue;
                if(!checked[unitId('ems',st.id,u.id)]) continue;
                if(!getEMSUnitCourseIds(u.type).includes(cid)) continue;
                getMemberNames(sc).forEach(name=>{ const tk=memberTrainedKey('ems',st.id,u.id,name,cid);
                  if(!trained[tk]) r.push({stationName:st.name,unitId:u.id,memberName:name,trainedKey:tk}); });
              }} return r; }},
        };

        // Each academy can run one course at a time independently.
        // isAcademyBusy returns true only if ALL academies for that dept are occupied.
        // getAvailableAcademy returns the first academy with no active session.
        const isAcademyBusy = (dept) => DEPT_META[dept].academies.every(ac=>
          DEPT_META[dept].courses.some(c=>sessions[courseSessionKey(ac.id,c.id)]));
        const getAvailableAcademy = (dept) => DEPT_META[dept].academies.find(ac=>
          !DEPT_META[dept].courses.some(c=>sessions[courseSessionKey(ac.id,c.id)]));

        // Build unified needs list sorted by member count desc
        const allNeeds = [];
        var _dmKeys=Object.keys(DEPT_META); for(var _dmi=0;_dmi<_dmKeys.length;_dmi++){var dept=_dmKeys[_dmi],meta=DEPT_META[dept];
          for(const course of meta.courses){
            const members = meta.getMem(course.id);
            if(members.length>0) allNeeds.push({dept,meta,course,members});
          }
        }
        allNeeds.sort((a,b)=>b.members.length-a.members.length);

        const totalNeeding = allNeeds.reduce((s,n)=>s+n.members.length,0);

        const SUB_TABS=[['needs','📋 Needs Training'],['run','🏫 Run a Course'],
          ['fd-ref','🔴 FD Courses'],['pd-ref','🔵 PD Courses'],['ems-ref','🟠 EMS Courses']];

        return(

    // Response time summary per unit
    var unitRtMap = {};
    for (var _rtci=0; _rtci<calls.length; _rtci++) {
      var _rtc = calls[_rtci];
      var _rtau = _rtc.assignedUnits || [];
      for (var _rtai=0; _rtai<_rtau.length; _rtai++) {
        var _rta = _rtau[_rtai];
        if (_rta.responseTimeSecs == null) continue;
        if (_rta.response === 'Upon Completion' || _rta.response === 'Mutual Aid' || _rta.response === 'Staffing') continue;
        if (!unitRtMap[_rta.uid]) unitRtMap[_rta.uid] = {total:0, count:0, fdTotal:0, fdCount:0};
        unitRtMap[_rta.uid].total += _rta.responseTimeSecs;
        unitRtMap[_rta.uid].count++;
        if (_rta.dueOrder && _rta.dueOrder.indexOf('1st') === 0) {
          unitRtMap[_rta.uid].fdTotal += _rta.responseTimeSecs;
          unitRtMap[_rta.uid].fdCount++;
        }
      }
    }
    var rtLines = Object.keys(unitRtMap)
      .filter(function(uid){
        // Spare engines need higher sample threshold — early calls may have been
        // logged before the Staffing fix and contain pre-response delay times
        var minSample = /^Spare Engine\b/.test(uid) ? 5 : 3;
        return unitRtMap[uid].count >= minSample;
      })
      .sort(function(a,b){
        var avgA = unitRtMap[a].total/unitRtMap[a].count;
        var avgB = unitRtMap[b].total/unitRtMap[b].count;
        return avgB-avgA; // slowest first
      })
      .map(function(uid) {
        var avg = Math.round(unitRtMap[uid].total/unitRtMap[uid].count);
        var mm = Math.floor(avg/60), ss = avg%60;
        var fdAvg = unitRtMap[uid].fdCount>0 ? Math.round(unitRtMap[uid].fdTotal/unitRtMap[uid].fdCount) : null;
        var fdStr = fdAvg!=null ? ' | 1st due avg: '+Math.floor(fdAvg/60)+':'+(fdAvg%60<10?'0':'')+fdAvg%60 : '';
        return uid+': avg '+mm+':'+(ss<10?'0':'')+ss+fdStr+' ('+unitRtMap[uid].count+' timed)';
      });

    var lines = [
      '=== GREENE COUNTY DES EXPORT === ('+totalCalls+' calls)',
      '--- CALLS BY TYPE ---',
    ].concat(Object.keys(byType).map(function(t){
      return t+': '+byType[t]+' ('+Math.round(byType[t]/totalCalls*100)+'%)';
    })).concat([
      '--- BUILT STATIONS & UNITS ---',
    ]).concat(builtStations).concat([
      '--- UNIT RESPONSE TIMES (avg, min 3 timed, slowest first) ---',
    ]).concat(rtLines.length > 0 ? rtLines : ['No timed response data yet']).concat([
      '--- NEXT BUILD TOP 10 ---',
    ]).concat(recLines);

    setExportText(lines.join('\n'));
    } catch(err) {
      setExportText('ERROR: '+err.message+'\n\n'+err.stack);
    }
  }

  function toggle(id) { setChecked(function(p){var n=Object.assign({},p); n[id]=!p[id]; return n;}); }
  function toggleExp(k) { setExp(function(p){var n=Object.assign({},p); n[k]=!p[k]; return n;}); }
  function toggleExt(eid, key, stId, extension) {
    var te = TIMED_EXTENSIONS[extension];
    toggle(eid);
    if (te && !checked[eid]) {
      var tk = extTimerKey(key, stId);
      setTimestamps(function(p){var n=Object.assign({},p); n[tk]=Date.now(); return n;});
    } else if (te && checked[eid]) {
      var tk2 = extTimerKey(key, stId);
      setTimestamps(function(p){var n=Object.assign({},p); delete n[tk2]; return n;});
    }
  }
  function toggleAll(sk, st) {
    var ids = allIds(sk, st);
    var all = ids.every(function(id){return checked[id];});
    setChecked(function(p){
      var n=Object.assign({},p);
      ids.forEach(function(id){n[id]=!all;});
      return n;
    });
  }
  function reset() {
    if (window.confirm('Reset ALL progress?')) {
      setChecked({});
      setTimestamps({});
      setTrained({});
      setSessions({});
    }
  }

  var isDone  = function(sk,st){return allIds(sk,st).every(function(id){return checked[id];});};
  var cntDone = function(sk,st){return allIds(sk,st).filter(function(id){return checked[id];}).length;};
  var cntTot  = function(sk,st){return allIds(sk,st).length;};
  var matches = function(st){
    if (!search) return true;
    var q = search.toLowerCase();
    return st.name.toLowerCase().includes(q) || (st.extension||'').toLowerCase().includes(q) ||
      st.units.some(function(u){return u.id.toLowerCase().includes(q)||u.type.toLowerCase().includes(q);});
  };

  var grand = ['fire','police','ems','aviation'].reduce(function(a,t){
    var s = tabStats(t,checked);
    return {total:a.total+s.total,done:a.done+s.done,totalSt:a.totalSt+s.totalSt,doneSt:a.doneSt+s.doneSt};
  },{total:0,done:0,totalSt:0,doneSt:0});
  var pct = grand.total>0?Math.round(grand.done/grand.total*100):0;
  var groups = getGroups(tab);

  var PROMINENT_TABS = TABS.filter(function(t){return t.prominent;});
  var DEPT_TABS = TABS.filter(function(t){return !t.prominent;});

  return (
    <div style={{minHeight:'100vh',background:'#f0f2f5',fontFamily:'system-ui,sans-serif'}}>

      {/* Top nav */}
      <div style={{background:'#1a2744',color:'white',padding:'10px 16px',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 8px rgba(0,0,0,0.3)'}}>
        <div style={{maxWidth:980,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}}>
            <div style={{fontWeight:800,fontSize:16,letterSpacing:0.5,flex:1}}>🚨 Greene County DES</div>
            <div style={{fontSize:11,color:'#8892a4'}}>{grand.doneSt}/{grand.totalSt} stations · {grand.done}/{grand.total} items · {pct}%</div>
            <button onClick={exportDigest} style={{fontSize:11,padding:'4px 10px',borderRadius:5,border:'1px solid #16a085',background:'transparent',color:'#7ecec4',cursor:'pointer'}}>📋 Export</button>
            <button onClick={reset} style={{fontSize:11,padding:'4px 10px',borderRadius:5,border:'1px solid #8892a4',background:'transparent',color:'#cdd',cursor:'pointer'}}>Reset</button>
          </div>
          {/* Prominent tabs row */}
          <div style={{display:'flex',gap:5,marginBottom:6,flexWrap:'wrap'}}>
            {PROMINENT_TABS.map(function(t) {
              return (
                <button key={t.key} onClick={function(){setTab(t.key); setExp({});}}
                  style={{padding:'6px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,
                    background:tab===t.key?t.color:'rgba(255,255,255,0.12)',
                    color:tab===t.key?'white':'#cdd'}}>
                  {t.label}
                </button>
              );
            })}
          </div>
          {/* Dept tabs row */}
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {DEPT_TABS.map(function(t) {
              var s = t.key==='medical'?null:tabStats(t.key,checked);
              return (
                <button key={t.key} onClick={function(){setTab(t.key); setExp({});}}
                  style={{padding:'5px 12px',borderRadius:6,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,
                    background:tab===t.key?t.color+'dd':'rgba(255,255,255,0.08)',
                    color:tab===t.key?'white':'#aab',borderBottom:tab===t.key?'2px solid '+t.color:'2px solid transparent'}}>
                  {t.label}
                  {s&&s.total>0&&<span style={{fontSize:9,marginLeft:4,opacity:0.85}}>{s.done}/{s.total}</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Search bar (dept tabs only) */}
      {!TABS.find(function(t){return t.key===tab&&t.prominent;}) && tab!=='medical' && (
        <div style={{maxWidth:980,margin:'10px auto 0',padding:'0 12px'}}>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search stations, units, extensions..."
            style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1px solid #ddd',fontSize:13,boxSizing:'border-box',
              boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}/>
        </div>
      )}

      {/* Export panel */}
      {exportText && (
        <div style={{background:'#1a2744',borderTop:'1px solid #2d3a5a',padding:'10px 16px'}}>
          <div style={{maxWidth:980,margin:'0 auto'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <span style={{fontSize:11,fontWeight:700,color:'#7ecec4'}}>📋 Export — click the box to select all, then copy and paste into chat</span>
              <button onClick={function(){setExportText('');}}
                style={{marginLeft:'auto',fontSize:10,padding:'2px 8px',borderRadius:4,
                  border:'1px solid #8892a4',background:'transparent',color:'#cdd',cursor:'pointer'}}>
                ✕ Close
              </button>
            </div>
            <textarea readOnly value={exportText}
              onClick={function(e){e.target.select();}}
              style={{width:'100%',height:180,fontSize:10,fontFamily:'monospace',
                background:'#0d1526',color:'#a8c0d6',border:'1px solid #2d3a5a',
                borderRadius:5,padding:'8px',resize:'vertical',boxSizing:'border-box'}}/>
          </div>
        </div>
      )}

      {/* PROMINENT TAB CONTENT */}
      {tab === 'recs' && (
        <RecsTab checked={checked} timestamps={timestamps} calls={calls} toggle={toggle}/>
      )}
      {tab === 'training' && (
        <TrainingTab checked={checked} trained={trained} sessions={sessions}
          setTrained={setTrained} setSessions={setSessions}
          trainingTab={trainingTab} setTrainingTab={setTrainingTab} now={now}/>
      )}
      {tab === 'calllog' && (
        <CalllogTab calls={calls} setCalls={setCalls}
          callForm={callForm} setCallForm={setCallForm}
          editingCallId={editingCallId} setEditingCallId={setEditingCallId}
          checked={checked}/>
      )}
      {tab === 'medical' && (
        <MedicalTab checked={checked} toggle={toggle}/>
      )}

      {/* STATION TABS */}
      {!TABS.find(function(t){return t.key===tab&&(t.prominent||t.key==='medical');}) && (
        <div style={{maxWidth:980,margin:'12px auto',padding:'0 12px'}}>
          {groups.map(function(grp) {
            var filtered = grp.stations.filter(matches);
            if (filtered.length===0) return null;
            return (
              <div key={grp.key+(grp.label||'')} style={{marginBottom:16}}>
                {grp.label && (
                  <div style={{fontSize:13,fontWeight:700,color:'#1a2744',marginBottom:8,
                    padding:'6px 10px',background:'white',borderRadius:7,border:'1px solid #e0e0e0'}}>
                    {grp.label}
                  </div>
                )}
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {filtered.map(function(st) {
                    var sk = grp.key;
                    var done = isDone(sk,st);
                    var cnt = cntDone(sk,st);
                    var tot = cntTot(sk,st);
                    var expKey = 's-'+sk+'-'+st.id;
                    var isOpen = exp[expKey]!==undefined ? exp[expKey] : !done;
                    var tc = sk==='pd' ? pdTypeColor(st) : (TYPE_COLORS[st.type]||TYPE_COLORS.urban);
                    var builtChk = !!checked[stId(sk,st.id)];
                    var extChk   = st.extension ? !!checked[extId(sk,st.id)] : false;
                    var extColor = EXT_COLORS[st.extension]||'#555';
                    var stLabel  = sk==='pd'
                      ? (st.id==='R' ? 'River Precinct' : (st.command===0 ? st.name : 'P'+st.id+' \u2014 '+st.name))
                      : st.name;
                    var totalCrew = st.units.reduce(function(sum,u){return sum+(UNIT_STAFF[u.type]||0);},0);
                    return (
                      <div key={st.id} style={{background:done?'#f0faf0':'white',
                        border:'2px solid '+(done?'#2ecc71':tc.border),
                        borderRadius:10,marginBottom:7,overflow:'hidden'}}>

                        {/* Station header */}
                        <div style={{background:done?'#e8f8e8':tc.bg,padding:'9px 13px',
                          display:'flex',alignItems:'center',gap:9}}>
                          <label style={{display:'flex',flexDirection:'column',alignItems:'center',
                            gap:1,cursor:'pointer',minWidth:38}}
                            onClick={function(e){e.stopPropagation();}}>
                            <input type="checkbox" checked={builtChk}
                              onChange={function(){toggle(stId(sk,st.id));}}
                              style={{width:17,height:17,cursor:'pointer',accentColor:tc.badge}}/>
                            <span style={{fontSize:8,color:'#888',textAlign:'center',
                              lineHeight:1.1,userSelect:'none'}}>Built</span>
                          </label>

                          <div style={{flex:1,cursor:'pointer',minWidth:0}}
                            onClick={function(){toggleExp(expKey);}}>
                            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                              <span style={{fontWeight:700,fontSize:14,color:'#1a2744'}}>{stLabel}</span>
                              {builtChk && (
                                <span style={{fontSize:10,background:'#27ae60',color:'white',
                                  borderRadius:4,padding:'1px 6px'}}>🏗 Built</span>
                              )}
                            </div>
                            <div style={{fontSize:11,color:'#666',marginTop:1,display:'flex',
                              gap:5,flexWrap:'wrap',alignItems:'center'}}>
                              {st.battalion && <span>{st.battalion}</span>}
                              {st.command>0 && <span>{'CMD'+st.command}</span>}
                              <span style={{background:tc.badge,color:'white',borderRadius:4,
                                padding:'1px 5px',fontSize:10}}>{tc.label}</span>
                              {totalCrew>0 && (
                                <span style={{background:'#1a2744',color:'white',borderRadius:4,
                                  padding:'1px 5px',fontSize:10}}>
                                  👤 {totalCrew}/shift
                                </span>
                              )}
                              {st.extension && (
                                <span style={{background:extChk?extColor:'transparent',
                                  color:extChk?'white':extColor,
                                  border:'1px solid '+extColor,borderRadius:4,
                                  padding:'1px 5px',fontSize:10}}>
                                  {extChk?'\u2713 ':''}{st.extension}
                                  <ExtTimerBadge grpKey={sk} stId={st.id} extension={st.extension} timestamps={timestamps}/>
                                </span>
                              )}
                            </div>
                            {st.address && (
                              <div style={{fontSize:10,color:'#999',marginTop:1}}>{st.address}</div>
                            )}
                          </div>

                          <div style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer'}}
                            onClick={function(){toggleExp(expKey);}}>
                            <div style={{textAlign:'right',minWidth:40}}>
                              <div style={{fontSize:13,fontWeight:700,
                                color:done?'#27ae60':tc.badge}}>{cnt}/{tot}</div>
                              <div style={{fontSize:10,color:'#999'}}>items</div>
                            </div>
                            <div style={{fontSize:16,color:'#bbb',userSelect:'none'}}>
                              {isOpen?'\u25b2':'\u25bc'}
                            </div>
                          </div>
                        </div>

                        {/* Expanded body */}
                        {isOpen && (
                          <div style={{borderTop:'1px solid '+tc.border+'22',padding:'9px 13px 11px'}}>

                            {/* Extension row */}
                            {st.extension && (
                              <label style={{display:'flex',alignItems:'center',gap:9,padding:'7px 11px',
                                marginBottom:9,
                                background:extChk?'#e8f8e8':'#f8f0ff',
                                border:'2px solid '+(extChk?'#2ecc71':extColor),
                                borderRadius:7,cursor:'pointer'}}>
                                <input type="checkbox" checked={extChk}
                                  onChange={function(){toggleExt(extId(sk,st.id),sk,st.id,st.extension);}}
                                  style={{width:15,height:15,accentColor:extColor,cursor:'pointer'}}/>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:13,fontWeight:700,
                                    color:extChk?'#27ae60':extColor,
                                    textDecoration:extChk?'line-through':'none'}}>
                                    {sk==='pd'?'Specialized Unit / Capability \u2014 ':'Extension Bay \u2014 '}{st.extension}
                                    <ExtTimerBadge grpKey={sk} stId={st.id} extension={st.extension} timestamps={timestamps}/>
                                  </div>
                                  <div style={{fontSize:11,color:'#888'}}>
                                    {sk==='pd'?'Special capability assigned to this precinct':'Physical extension structure'}
                                    {' \u2014 '}${(extCost(st.extension)/1000).toFixed(0)}k
                                  </div>
                                </div>
                                <span style={{background:extColor,color:'white',borderRadius:4,
                                  padding:'2px 7px',fontSize:11,fontWeight:600}}>
                                  {sk==='pd'?'SPEC':'EXT'}
                                </span>
                                {extChk && <span>&#10003;</span>}
                              </label>
                            )}

                            {/* PD command zone */}
                            {sk==='pd' && st.command!==undefined && st.command>0 && (
                              <div style={{marginBottom:8,padding:'5px 10px',background:'#f0f4ff',
                                borderRadius:6,border:'1px solid #c5d0e8',fontSize:11,color:'#444'}}>
                                <span style={{fontWeight:700,color:tc.badge}}>Command Zone {st.command}</span>
                                {st.areaType && <span style={{color:'#888',marginLeft:6}}>{st.areaType}</span>}
                              </div>
                            )}

                            {/* Prison cells */}
                            {sk==='pd' && (
                              <PrisonCells grpKey={sk} stId={st.id} checked={checked} toggle={toggle}/>
                            )}

                            {st.extension && st.units.length>0 && (
                              <div style={{fontSize:10,fontWeight:600,color:'#999',
                                textTransform:'uppercase',letterSpacing:0.5,marginBottom:7}}>Units</div>
                            )}

                            {/* Units */}
                            <div style={{display:'flex',flexDirection:'column',gap:6}}>
                              {st.units.map(function(u,ui) {
                                var uid2     = unitId(sk,st.id,u.id);
                                var uChk     = !!checked[uid2];
                                var stor     = STORAGE_ITEMS[u.id]||[];
                                var sDone    = stor.filter(function(s){return !!checked[storageItemKey(sk,st.id,u.id,s)];}).length;
                                var uKey     = 'u-'+sk+'-'+st.id+'-'+u.id;
                                var uOpen    = !!exp[uKey];
                                var uFull    = uChk && (stor.length===0 || sDone===stor.length);
                                var cost     = unitCost(ui);
                                var extBlocked = isUnitExtBlocked(u.id, st.extension, !!checked[extId(sk,st.id)], u.type);
                                return (
                                  <div key={u.id} style={{border:'1px solid '+(uFull?'#2ecc71':extBlocked?'#f5c6cb':'#ddd'),
                                    borderRadius:6,overflow:'hidden',
                                    background:uFull?'#e8f8e8':extBlocked?'#fff5f5':'#fafafa',
                                    opacity:extBlocked?0.6:1}}>
                                    <div style={{display:'flex',alignItems:'center',gap:7,padding:'6px 9px'}}>
                                      <input type="checkbox" checked={uChk}
                                        disabled={extBlocked}
                                        onChange={function(){if(!extBlocked) toggle(uid2);}}
                                        style={{width:14,height:14,accentColor:'#27ae60',cursor:extBlocked?'not-allowed':'pointer'}}/>
                                      <div style={{flex:1,cursor:stor.length&&!extBlocked?'pointer':'default',minWidth:0}}
                                        onClick={function(){if(stor.length&&!extBlocked) toggleExp(uKey);}}>
                                        <div style={{fontSize:13,fontWeight:600,
                                          color:uChk?'#27ae60':extBlocked?'#c0392b':'#1a2744',
                                          textDecoration:uFull?'line-through':'none'}}>{u.id}</div>
                                        <div style={{fontSize:11,color:'#888'}}>{u.type}
                                          {cost>0 && ' \u2014 $'+(cost/1000).toFixed(0)+'k'}
                                          {(UNIT_STAFF[u.type]||0)>0 && (
                                            <span style={{marginLeft:5,color:'#aaa'}}>
                                              · {UNIT_STAFF[u.type]} staff
                                            </span>
                                          )}
                                          {extBlocked && (
                                            <span style={{marginLeft:6,color:'#c0392b',fontWeight:600}}>
                                              🔒 Requires {st.extension} extension
                                            </span>
                                          )}
                                        </div>
                                        {u.route && (
                                          <div style={{fontSize:10,color:'#777',fontStyle:'italic',
                                            marginTop:1,lineHeight:1.3}}>{u.route}</div>
                                        )}
                                      </div>
                                      {stor.length>0 && (
                                        <div style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer'}}
                                          onClick={function(){toggleExp(uKey);}}>
                                          <span style={{fontSize:11,fontWeight:600,
                                            color:sDone===stor.length?'#27ae60':sDone>0?'#e67e22':'#bbb'}}>
                                            📦 {sDone}/{stor.length}
                                          </span>
                                          <span style={{fontSize:12,color:'#bbb',userSelect:'none'}}>
                                            {uOpen?'\u25b2':'\u25bc'}
                                          </span>
                                        </div>
                                      )}
                                      {uFull && <span style={{fontSize:12}}>&#10003;</span>}
                                    </div>
                                    {stor.length>0 && uOpen && (
                                      <div style={{borderTop:'1px solid #eee',
                                        padding:'5px 9px 7px 34px',
                                        background:'#f2f2f2',
                                        display:'flex',flexDirection:'column',gap:4}}>
                                        <div style={{fontSize:9,fontWeight:600,color:'#999',
                                          textTransform:'uppercase',letterSpacing:0.5,marginBottom:1}}>
                                          Storage Contents
                                        </div>
                                        {stor.map(function(s) {
                                          var sid2 = storageItemKey(sk,st.id,u.id,s);
                                          var sChk = !!checked[sid2];
                                          return (
                                            <label key={s} style={{display:'flex',alignItems:'center',
                                              gap:7,cursor:'pointer'}}>
                                              <input type="checkbox" checked={sChk}
                                                onChange={function(){toggle(sid2);}}
                                                style={{width:12,height:12,accentColor:'#27ae60',cursor:'pointer'}}/>
                                              <span style={{fontSize:12,
                                                color:sChk?'#27ae60':'#444',
                                                textDecoration:sChk?'line-through':'none'}}>{s}</span>
                                              {sChk && <span style={{fontSize:10,color:'#27ae60'}}>&#10003;</span>}
                                            </label>
                                          );
                                        })}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>

                            {/* Storage room */}
                            {hasAnyStorage(st, sk) && (
                              <StorageRoomBlock grpKey={sk} st={st} checked={checked} toggle={toggle}/>
                            )}

                            {/* Mark all button */}
                            <div style={{marginTop:9,textAlign:'right'}}>
                              <button onClick={function(){toggleAll(sk,st);}}
                                style={{fontSize:11,padding:'3px 9px',borderRadius:5,
                                  border:'1px solid #ccc',cursor:'pointer',
                                  background:'white',color:'#555'}}>
                                {allIds(sk,st).every(function(id){return checked[id];})?'Unmark all':'Mark all complete'}
                              </button>
                            </div>

                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

    </div>
  );
}

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
</body>
</html>
